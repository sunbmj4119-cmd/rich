<!doctype html><html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="매매기록">
<title>매매 기록</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,sans-serif;margin:0;padding:14px;background:#f5f5f7;color:#1d1d1f}
h1{font-size:20px;margin:4px 0 14px}
.card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
label{display:block;font-size:13px;color:#666;margin:10px 0 4px;font-weight:600}
input,select{width:100%;padding:12px;font-size:16px;border:1px solid #ddd;border-radius:10px;background:#fff}
.seg{display:flex;gap:8px;margin-top:4px}
.seg button{flex:1;padding:12px;font-size:15px;border:1px solid #ddd;border-radius:10px;background:#fff;font-weight:600}
.seg button.on-buy{background:#ffecec;border-color:#d70015;color:#d70015}
.seg button.on-sell{background:#e8f0fe;border-color:#0071e3;color:#0071e3}
.big{width:100%;padding:15px;font-size:17px;font-weight:700;border:0;border-radius:12px;background:#0071e3;color:#fff;margin-top:16px}
.big:active{opacity:.7}
.rec{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.rec:last-child{border:0}
.del{color:#d70015;background:none;border:0;font-size:13px;padding:4px 8px}
.tag-b{color:#d70015;font-weight:700} .tag-s{color:#0071e3;font-weight:700}
.copy{width:100%;padding:14px;font-size:15px;font-weight:700;border:0;border-radius:12px;background:#34c759;color:#fff;margin-top:8px}
.copy:active{opacity:.7}
.hint{font-size:12px;color:#999;line-height:1.6;margin-top:8px}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1d1d1f;color:#fff;padding:12px 22px;border-radius:24px;font-size:14px;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.empty{color:#aaa;text-align:center;padding:20px;font-size:14px}
</style></head><body>
<a href="index.html" style="display:inline-block;color:#0071e3;text-decoration:none;font-size:14px;margin-bottom:8px">← 신호 대시보드</a>
<h1>📝 매매 기록</h1>

<div class="card">
  <label>종목</label>
  <select id="stock"></select>

  <label>구분</label>
  <div class="seg">
    <button id="bBuy" class="on-buy" onclick="setType('매수')">매수</button>
    <button id="bSell" onclick="setType('매도')">매도</button>
  </div>

  <label>날짜</label>
  <input type="date" id="date">

  <label id="amtLabel">금액 (원)</label>
  <input type="number" id="amount" inputmode="numeric" placeholder="예: 1000000">
  <div class="hint" id="amtHint">산 금액을 적으세요. 매도는 비워두면 전량매도.</div>

  <button class="big" onclick="addRecord()">기록 추가</button>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <b style="font-size:15px">기록 목록</b>
    <span id="count" style="font-size:12px;color:#999"></span>
  </div>
  <div id="list"></div>
  <button class="copy" onclick="copyCSV()">📋 GitHub용 CSV 전체 복사</button>
  <div class="hint">복사 후 GitHub의 data/my_trades.csv 에 붙여넣기 하세요.<br>
  (전체 내용을 이걸로 교체하면 됩니다)</div>
</div>

<div class="toast" id="toast"></div>

<script>
const NAMES = ["CJ제일제당", "DB손해보험", "DB하이텍", "DL이앤씨", "GS", "GS리테일", "HD현대", "HD현대일렉트릭", "HD현대중공업", "HMM", "KB금융", "KCC", "KT", "KT&G", "LG", "LG생활건강", "LG에너지솔루션", "LG이노텍", "LG전자", "LG화학", "NAVER", "NC", "OCI", "POSCO홀딩스", "S-Oil", "SK", "SK바이오팜", "SK스퀘어", "SK이노베이션", "SK텔레콤", "SK하이닉스", "고려아연", "금양", "기아", "기업은행", "넷마블", "녹십자", "두산", "두산밥캣", "롯데지주", "롯데케미칼", "리노공업", "메리츠금융지주", "미래에셋증권", "삼성SDI", "삼성물산", "삼성바이오로직스", "삼성생명", "삼성에스디에스", "삼성전기", "삼성전자", "삼성전자우", "삼성중공업", "삼성카드", "삼성화재", "셀트리온", "솔브레인", "신세계", "신한지주", "아모레퍼시픽", "아모레퍼시픽홀딩스", "알체라", "에코프로머티", "영원무역", "오리온", "우리금융지주", "유한양행", "이마트", "종근당", "카카오", "카카오뱅크", "케어젠", "코오롱인더", "코웨이", "크래프톤", "포스코인터내셔널", "포스코퓨처엠", "하나금융지주", "한국금융지주", "한국전력", "한국타이어앤테크놀로지", "한국항공우주", "한미사이언스", "한미약품", "한전기술", "한화생명", "한화솔루션", "한화시스템", "한화에어로스페이스", "한화오션", "현대건설", "현대로템", "현대모비스", "현대백화점", "현대제철", "현대차", "현대차2우B", "현대해상", "호텔신라", "후성"];
let type = '매수';

// 종목 드롭다운 채우기
const sel = document.getElementById('stock');
NAMES.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;sel.appendChild(o);});

// 오늘 날짜 기본값
document.getElementById('date').value = new Date().toISOString().slice(0,10);

function setType(t){
  type=t;
  document.getElementById('bBuy').className = t==='매수'?'on-buy':'';
  document.getElementById('bSell').className = t==='매도'?'on-sell':'';
  document.getElementById('amtLabel').textContent = t==='매수'?'금액 (원)':'금액 (비우면 전량매도)';
  document.getElementById('amtHint').textContent = t==='매수'?'산 금액을 적으세요.':'비워두면 전량매도로 처리됩니다.';
}

function load(){ return JSON.parse(localStorage.getItem('trades')||'[]'); }
function save(r){ localStorage.setItem('trades', JSON.stringify(r)); }

function addRecord(){
  const stock=sel.value, date=document.getElementById('date').value;
  const amount=document.getElementById('amount').value.trim();
  if(!date){toast('날짜를 선택하세요');return;}
  if(type==='매수' && !amount){toast('매수 금액을 적으세요');return;}
  const recs=load();
  recs.push({date,stock,type,amount:amount||''});
  recs.sort((a,b)=>a.date.localeCompare(b.date));
  save(recs);
  document.getElementById('amount').value='';
  render();
  toast('✅ '+stock+' '+type+' 기록됨');
}

function delRecord(i){
  const recs=load(); recs.splice(i,1); save(recs); render();
}

function render(){
  const recs=load(), list=document.getElementById('list');
  document.getElementById('count').textContent = recs.length+'건';
  if(!recs.length){list.innerHTML='<div class="empty">아직 기록이 없습니다</div>';return;}
  list.innerHTML='';
  recs.forEach((r,i)=>{
    const amt = r.amount? (Number(r.amount).toLocaleString()+'원') : '전량';
    const tag = r.type==='매수'?'tag-b':'tag-s';
    const d=document.createElement('div'); d.className='rec';
    d.innerHTML='<span><b>'+r.stock+'</b> <span class="'+tag+'">'+r.type+'</span>'+
      ' <span style="color:#999;font-size:12px">'+r.date+' · '+amt+'</span></span>'+
      '<button class="del" onclick="delRecord('+i+')">삭제</button>';
    list.appendChild(d);
  });
}

function copyCSV(){
  const recs=load();
  let csv='날짜,종목명,구분,금액\n';
  recs.forEach(r=>{csv+=r.date+','+r.stock+','+r.type+','+r.amount+'\n';});
  navigator.clipboard.writeText(csv).then(()=>toast('📋 복사됨! GitHub에 붙여넣으세요'))
    .catch(()=>{
      // 클립보드 실패시 텍스트 선택 방식
      const ta=document.createElement('textarea');ta.value=csv;document.body.appendChild(ta);
      ta.select();document.execCommand('copy');document.body.removeChild(ta);
      toast('📋 복사됨! GitHub에 붙여넣으세요');
    });
}

function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.className='toast show';
  setTimeout(()=>t.className='toast',1800);
}

setType('매수'); render();
</script>
</body></html>
