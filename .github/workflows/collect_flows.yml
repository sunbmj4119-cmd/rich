name: collect-flows
on:
  workflow_dispatch:
    inputs:
      backfill_from:
        description: "백필 시작일 (예: 2018-01-01). 비우면 최근 7일만"
        required: false
        default: ""
jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install pandas numpy "pykrx>=1.2.8"
      - name: collect
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: |
          if [ -n "${{ github.event.inputs.backfill_from }}" ]; then
            python src/collect_flows.py --backfill ${{ github.event.inputs.backfill_from }}
          else
            python src/collect_flows.py
          fi
      - name: verify
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python src/collect_flows.py --check
      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          # 존재하는 파일만 add (없어도 에러 안 남)
          git add data/flows.csv data/ohlcv.csv data/marketcap.csv 2>/dev/null || true
          git add -A data/
          if git diff --cached --quiet; then
            echo "변경된 데이터 없음 (수집 0건일 수 있음 - 로그 확인)"
          else
            git commit -m "collect flows $(date +%Y-%m-%d)"
            git pull --rebase
            git push
          fi
