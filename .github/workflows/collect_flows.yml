name: collect-flows
# 수급·OHLCV 수집 (수동 실행). 백필은 처음 1회, 이후는 daily.yml이 매일 갱신
on:
  workflow_dispatch:
    inputs:
      backfill_from:
        description: "백필 시작일 (예: 2018-01-01). 비우면 최근 7일만"
        required: false
        default: ""
jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 330   # 백필은 오래 걸림 (최대 5.5시간)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install pandas numpy pykrx
      - name: collect
        run: |
          if [ -n "${{ github.event.inputs.backfill_from }}" ]; then
            python src/collect_flows.py --backfill ${{ github.event.inputs.backfill_from }}
          else
            python src/collect_flows.py
          fi
      - name: verify
        run: python src/collect_flows.py --check
      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/flows.csv data/ohlcv.csv data/marketcap.csv
          git commit -m "collect flows $(date +%Y-%m-%d)" || echo "no changes"
          git pull --rebase
          git push
