name: daily-run
on:
  schedule:
    # 매일 오후 5시 KST (UTC 08:00), 평일
    - cron: "0 8 * * 1-5"
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: pip install pandas numpy pyyaml "pykrx>=1.2.8" finance-datareader

      - name: 1) 주가 갱신
        run: python src/update_prices.py

      - name: 1-2) 수급·OHLCV 갱신 (최근 7일)
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
        run: python src/collect_flows.py || echo "수급 수집 실패(무시하고 계속)"

      - name: 1-3) 업종/섹터 갱신 (fdr, 실패 무시)
        run: python src/collect_sectors.py || echo "업종 수집 실패(무시하고 계속)"

      - name: 2) 점수 계산
        run: python src/score.py

      - name: 3) 매매 신호 (실제 거래내역 기반)
        run: |
          echo "## 🔔 매매 신호" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python src/signal.py | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 4) 상세 데이터 생성
        run: python src/build_data.py

      - name: 5) HTML 리포트
        run: python src/report.py

      - name: 5) 커밋
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ docs/
          git commit -m "daily $(date +%Y-%m-%d)" || echo "no changes"
          git pull --rebase
          git push
